<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Terminal · tokenfolio</title>
<link rel="icon" href="../../favicon.svg" type="image/svg+xml">
<meta property="og:type" content="website">
<meta property="og:title" content="tokenfolio · terminal">
<meta property="og:description" content="An AI-usage portfolio, hexdumped from a hacker's terminal.">
<meta property="og:image" content="https://tt-a1i.github.io/tokenfolio/og.png">
<meta property="og:url" content="https://tt-a1i.github.io/tokenfolio/templates/terminal/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="tokenfolio · terminal">
<meta name="twitter:description" content="An AI-usage portfolio, hexdumped from a hacker's terminal.">
<meta name="twitter:image" content="https://tt-a1i.github.io/tokenfolio/og.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0d0e;
    --bg2:      #0d1214;
    --green:    #4ade80;
    --green-hi: #00ff5f;
    --green-dim:#1a6b3a;
    --yellow:   #facc15;
    --red:      #f87171;
    --white:    #e2e8f0;
    --muted:    #4b5563;
    --border:   #1e2d23;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', 'Courier New', monospace;
    background: var(--bg);
    color: var(--green);
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    font-variant-numeric: tabular-nums;
  }

  .terminal {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* ── Boot sequence ───────────────────────────── */
  .boot {
    margin-bottom: 36px;
    overflow: hidden;
  }

  .boot-line {
    display: block;
    white-space: pre;
    overflow: hidden;
    max-width: 0;
    animation: type-in 0.4s steps(60, end) forwards;
  }

  .boot-line:nth-child(1)  { animation-delay: 0s; }
  .boot-line:nth-child(2)  { animation-delay: 0s; }
  .boot-line:nth-child(3)  { animation-delay: 0s; }
  .boot-line:nth-child(4)  { animation-delay: 0s; }
  .boot-line:nth-child(5)  { animation-delay: 0s; }
  .boot-line:nth-child(6)  { animation-delay: 0s; }

  @keyframes type-in {
    from { max-width: 0; }
    to   { max-width: 100%; }
  }

  .boot .prompt { color: var(--yellow); }
  .boot .cmd    { color: var(--white); }
  .boot .arrow  { color: var(--green); }
  .boot .dim    { color: var(--muted); }
  .boot .ok     { color: var(--green-hi); }

  /* ── Section blocks ─────────────────────────── */
  .section {
    margin-bottom: 28px;
    opacity: 0;
    animation: fade-in 0.5s ease forwards;
  }

  .section:nth-of-type(1) { animation-delay: 0s; }
  .section:nth-of-type(2) { animation-delay: 0s; }
  .section:nth-of-type(3) { animation-delay: 0s; }
  .section:nth-of-type(4) { animation-delay: 0s; }
  .section:nth-of-type(5) { animation-delay: 0s; }
  .section:nth-of-type(6) { animation-delay: 0s; }
  .section:nth-of-type(7) { animation-delay: 0s; }

  @keyframes fade-in {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ASCII Box components */
  .box-top, .box-bot, .box-title-bar {
    display: block;
    color: var(--green-dim);
    white-space: pre;
  }
  .box-title-bar .title-text {
    color: var(--green);
    font-weight: 700;
  }
  .box-row {
    display: flex;
    color: var(--green-dim);
  }
  .box-row .pipe {
    flex-shrink: 0;
    color: var(--green-dim);
  }
  .box-row .content {
    flex: 1;
    padding: 0 1ch;
    color: var(--white);
  }

  /* ── User header ─────────────────────────────── */
  .user-name   { color: var(--green-hi); font-weight: 700; font-size: 15px; }
  .user-handle { color: var(--yellow); }
  .user-title  { color: var(--muted); }
  .user-loc    { color: var(--muted); }
  .user-bio    { color: var(--white); font-style: italic; }
  .user-link   { color: var(--green); }
  .user-since  { color: var(--muted); }

  /* ── Totals grid ─────────────────────────────── */
  .totals-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    padding: 4px 0;
  }
  .total-cell {
    padding: 6px 0;
  }
  .total-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
  .total-value { color: var(--green-hi); font-size: 22px; font-weight: 700; }
  .total-hero {
    margin: 4px 0 16px;
    padding: 12px 14px;
    border: 1px solid var(--green);
    background: linear-gradient(180deg, rgba(0,255,95,0.06), transparent);
  }
  .total-hero .num {
    font-family: inherit;
    font-size: clamp(56px, 11vw, 108px);
    font-weight: 800;
    color: var(--green-hi);
    line-height: 1;
    letter-spacing: -0.03em;
    text-shadow: 0 0 24px rgba(0,255,95,0.4);
  }
  .total-hero .sub {
    margin-top: 6px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .total-sub   { color: var(--muted); font-size: 11px; }

  /* ── Month bars ──────────────────────────────── */
  .month-line {
    display: flex;
    align-items: baseline;
    gap: 0;
    padding: 2px 0;
    font-size: 13px;
    white-space: pre;
  }
  .month-label { color: var(--muted); display: inline-block; width: 4ch; }
  .month-bar   { color: var(--green); }
  .month-empty { color: var(--green-dim); opacity: 0.4; }
  .month-tok   { color: var(--white); display: inline-block; width: 7ch; text-align: right; margin-left: 1ch; }
  .month-peak  { color: var(--red); font-weight: 700; margin-left: 1ch; }
  .month-proj  { color: var(--muted); margin-left: 1ch; font-size: 12px; }

  /* ── Model bars ──────────────────────────────── */
  .model-line {
    display: flex;
    align-items: baseline;
    padding: 3px 0;
    white-space: pre;
    font-size: 13px;
  }
  .model-name  { color: var(--yellow); display: inline-block; width: 14ch; }
  .model-bar   { color: var(--green); }
  .model-empty { color: var(--green-dim); opacity: 0.4; }
  .model-pct   { color: var(--green-hi); display: inline-block; width: 5ch; text-align: right; margin-left: 1ch; }
  .model-tok   { color: var(--muted); margin-left: 1ch; }
  .model-sess  { color: var(--muted); margin-left: 1ch; }

  /* ── Project tree ────────────────────────────── */
  .proj-line {
    padding: 3px 0;
    font-size: 13px;
    white-space: pre;
  }
  .proj-branch { color: var(--green-dim); }
  .proj-name   { color: var(--green-hi); font-weight: 700; }
  .proj-lang   { color: var(--yellow); }
  .proj-tok    { color: var(--white); }
  .proj-sess   { color: var(--muted); }
  .proj-desc   { color: var(--muted); display: block; padding-left: 6ch; font-size: 12px; font-style: italic; }

  /* ── Highlights ──────────────────────────────── */
  .hl-line {
    padding: 3px 0;
    font-size: 13px;
    display: flex;
    align-items: baseline;
  }
  .hl-arrow { color: var(--green); margin-right: 1ch; }
  .hl-key   { color: var(--yellow); font-weight: 700; }
  .hl-dots  { color: var(--green-dim); flex: 1; overflow: hidden; }
  .hl-val   { color: var(--green-hi); font-weight: 700; margin-left: 1ch; }
  .hl-detail { color: var(--muted); margin-left: 1ch; }

  /* ── Footer prompt ───────────────────────────── */
  .footer-prompt {
    margin-top: 48px;
    display: flex;
    align-items: center;
    gap: 0.5ch;
    opacity: 0;
    animation: fade-in 0.5s ease 0s forwards;
  }
  .footer-prompt .ps { color: var(--yellow); }
  .footer-prompt .path { color: var(--green); }
  .cursor {
    display: inline-block;
    width: 0.6em;
    height: 1.1em;
    background: var(--green);
    vertical-align: text-bottom;
    animation: blink 1.1s step-end infinite;
    margin-left: 2px;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  /* ── Emphasis helpers ────────────────────────── */
  .hi  { color: var(--green-hi); font-weight: 700; }
  .dim { color: var(--muted); }
  .warn { color: var(--yellow); }
  .err  { color: var(--red); font-weight: 700; }

  /* ── Responsive ──────────────────────────────── */
  @media (max-width: 600px) {
    body { font-size: 11px; }
    .terminal { padding: 16px 12px 60px; }
    .totals-grid { grid-template-columns: 1fr 1fr; }
    .total-value { font-size: 15px; }
    .proj-desc { display: none; }
  }
</style>
</head>
<body data-tf-capture=".terminal">
<div class="terminal">

  <!-- Boot sequence -->
  <div class="boot" id="boot"></div>

  <!-- Sections rendered by JS -->
  <div id="content"></div>

  <!-- Footer prompt with blinking cursor -->
  <div class="footer-prompt">
    <span class="ps">tokenfolio</span>
    <span class="dim">@</span>
    <span class="path" id="footer-handle">~</span>
    <span class="dim"> $ </span>
    <span class="cursor"></span>
  </div>

</div>

<script src="../../data.js"></script>
<script>
(function() {
  const D = window.RESUME_DATA;
  const F = window.RESUME_FMT;

  /* ── Helpers ───────────────────────────────── */

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // Pad string on the right to `len` chars (counts visible chars only)
  function rpad(s, len) {
    const visible = String(s).replace(/<[^>]+>/g, '');
    const pad = Math.max(0, len - visible.length);
    return s + ' '.repeat(pad);
  }

  // Dot leader: fills space between key and value with ·
  function dotLeader(key, value, totalWidth) {
    const keyLen  = key.replace(/<[^>]+>/g, '').length;
    const valLen  = value.replace(/<[^>]+>/g, '').length;
    const dots    = Math.max(3, totalWidth - keyLen - valLen);
    return '·'.repeat(dots);
  }

  // ASCII bar: filled █ + empty ░, total barWidth chars
  function asciiBar(ratio, barWidth, filledChar, emptyChar) {
    const filled = Math.round(ratio * barWidth);
    const empty  = barWidth - filled;
    return filledChar.repeat(filled) + emptyChar.repeat(empty);
  }

  // Box-drawing helpers (double-line border for sections)
  function boxTop(labelHtml, innerWidth) {
    const labelText = labelHtml.replace(/<[^>]+>/g, '');
    // ╔═[ TITLE ]══...══╗
    const titlePart = '[ ' + labelText + ' ]';
    const remaining = Math.max(0, innerWidth - titlePart.length - 2);
    const right = '═'.repeat(remaining);
    const titleHtml = '[ <span class="title-text">' + esc(labelText) + '</span> ]';
    return '╔═' + titleHtml + right + '╗';
  }

  function boxBot(innerWidth) {
    return '╚' + '═'.repeat(innerWidth) + '╝';
  }

  function boxLine(contentHtml, innerWidth) {
    // pad content to innerWidth
    const contentText = contentHtml.replace(/<[^>]+>/g, '');
    const pad = Math.max(0, innerWidth - contentText.length);
    return '║ ' + contentHtml + ' '.repeat(Math.max(0, pad - 1)) + ' ║';
  }

  function wrapBox(titleLabel, linesHtml, innerWidth) {
    const labelText = titleLabel.replace(/<[^>]+>/g, '');
    const titlePart = '[ ' + labelText + ' ]';
    const remaining = Math.max(0, innerWidth - titlePart.length - 2);
    const right = '═'.repeat(remaining);
    const titleHtml = '[ <span class="title-text">' + esc(labelText) + '</span> ]';
    const top = '<span class="box-top dim">╔═' + titleHtml + right + '╗</span>';
    const bot = '<span class="box-bot dim">╚' + '═'.repeat(innerWidth) + '╝</span>';
    const rows = linesHtml.map(line => {
      const plainLen = line.replace(/<[^>]+>/g, '').length;
      const pad = Math.max(0, innerWidth - 2 - plainLen);
      return '<span class="dim">║</span> ' + line + ' '.repeat(Math.max(0, pad)) + ' <span class="dim">║</span>';
    });
    return [top, ...rows, bot].join('\n');
  }

  const W = 76; // inner box width (chars between ║...║)

  /* ── Boot lines ─────────────────────────────── */
  const handle = esc(D.user.handle);
  const bootLines = [
    `<span class="prompt">$</span> <span class="cmd">tokenfolio show --user ${handle} --year ${D.year}</span>`,
    `<span class="arrow">▸</span> <span class="dim">initializing tokenfolio v0.2.0...</span>`,
    `<span class="arrow">▸</span> <span class="dim">scanning ~/.claude/projects/...</span>`,
    `<span class="arrow">▸</span> <span class="dim">found <span class="ok">${D.totals.sessions}</span> sessions across <span class="ok">${D.totals.projects}</span> projects</span>`,
    `<span class="arrow">▸</span> <span class="dim">building report for <span class="ok">${esc(D.user.name)}</span> (${handle})</span>`,
    `<span class="arrow">▸</span> <span class="dim">render: </span><span class="ok">ok</span>`,
  ];

  const bootEl = document.getElementById('boot');
  bootLines.forEach((line, i) => {
    const span = document.createElement('span');
    span.className = 'boot-line';
    span.innerHTML = line;
    bootEl.appendChild(span);
  });

  /* ── Footer ─────────────────────────────────── */
  document.getElementById('footer-handle').textContent = D.user.handle;

  /* ── Render sections ─────────────────────────── */
  const content = document.getElementById('content');

  function section(html) {
    const div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = html;
    content.appendChild(div);
  }

  /* ── 1. USER INFO ─────────────────────────────── */
  (function() {
    const u = D.user;
    const lines = [];

    lines.push(
      `<span class="user-name">${esc(u.name)}</span>  <span class="user-handle">${esc(u.handle)}</span>`
    );
    lines.push(
      `<span class="user-title">${esc(u.title)}</span>  <span class="dim">·</span>  <span class="user-loc">${esc(u.location)}</span>`
    );
    lines.push(`<span class="user-since">since ${esc(u.since)}</span>`);
    lines.push('');
    lines.push(`<span class="user-bio">"${esc(u.bio)}"</span>`);
    lines.push('');
    const linkHtml = u.links.map((l, i) =>
      `<a class="user-link" href="${esc(l.url)}" target="_blank">${esc(l.label)}</a>`
    ).join('  ');
    lines.push(linkHtml);

    section(wrapBox('USER', lines, W));
  })();

  /* ── 2. TOTALS ──────────────────────────────── */
  (function() {
    const T = D.totals;
    const cells = [
      { label: 'TOTAL TOKENS',   value: F.num(T.tokens),           sub: F.comma(T.tokens) + ' raw' },
      { label: 'INPUT',          value: F.num(T.input_tokens),      sub: F.pct(T.input_tokens, T.tokens) },
      { label: 'OUTPUT',         value: F.num(T.output_tokens),     sub: F.pct(T.output_tokens, T.tokens) },
      { label: 'SESSIONS',       value: T.sessions,                 sub: T.projects + ' projects' },
      { label: 'AVG SESSION',    value: F.num(T.avg_session_tokens), sub: 'tokens / session' },
      { label: 'TOTAL COST',     value: '$' + T.cost_usd.toFixed(2), sub: 'USD ' + D.year },
    ];

    // Render hero block (giant total tokens) + two rows of remaining stats
    section(
      '<div class="total-hero">' +
        '<div class="num">' + esc(F.num(T.tokens)) + '</div>' +
        '<div class="sub">total tokens · ' + esc(F.comma(T.tokens)) + ' raw · ' + esc(D.year) + '</div>' +
      '</div>'
    );

    const lines = [];
    lines.push('');

    // Row 1
    const row1 = cells.slice(0, 3);
    const labelRow1 = row1.map(c => rpad(`<span class="dim">${esc(c.label)}</span>`, 24)).join('  ');
    const valueRow1 = row1.map(c => rpad(`<span class="total-value hi">${esc(c.value)}</span>`, 24)).join('  ');
    const subRow1   = row1.map(c => rpad(`<span class="dim">${esc(c.sub)}</span>`, 24)).join('  ');
    lines.push(labelRow1);
    lines.push(valueRow1);
    lines.push(subRow1);
    lines.push('');

    // Row 2
    const row2 = cells.slice(3);
    const labelRow2 = row2.map(c => rpad(`<span class="dim">${esc(c.label)}</span>`, 24)).join('  ');
    const valueRow2 = row2.map(c => rpad(`<span class="total-value hi">${esc(c.value)}</span>`, 24)).join('  ');
    const subRow2   = row2.map(c => rpad(`<span class="dim">${esc(c.sub)}</span>`, 24)).join('  ');
    lines.push(labelRow2);
    lines.push(valueRow2);
    lines.push(subRow2);
    lines.push('');

    section(wrapBox('TOTALS // ' + D.year, lines, W));
  })();

  /* ── 3. BY_MONTH ──────────────────────────────── */
  (function() {
    const maxTok = Math.max(...D.by_month.map(m => m.tokens));
    const BAR_W  = 24;

    const lines = [''];
    lines.push(
      `<span class="dim">     ${'─'.repeat(BAR_W + 2)}  tokens   sessions  project</span>`
    );

    D.by_month.forEach((m, i) => {
      const ratio   = m.tokens / maxTok;
      const filled  = Math.round(ratio * BAR_W);
      const empty   = BAR_W - filled;
      const barHtml =
        `<span class="month-bar">${'█'.repeat(filled)}</span>` +
        `<span class="month-empty">${'░'.repeat(empty)}</span>`;

      const tokStr  = F.num(m.tokens).padStart(6);
      const sessStr = String(m.sessions).padStart(4);
      const projStr = esc(m.top_project);

      let line =
        `<span class="month-label ${m.peak ? 'err' : ''}">${esc(m.label).toUpperCase()}</span> ` +
        `<span class="dim">│</span>${barHtml}<span class="dim">│</span> ` +
        `<span class="month-tok">${tokStr}</span>` +
        `<span class="dim">  ${sessStr} sess  </span>` +
        `<span class="month-proj">${projStr}</span>`;

      if (m.peak) {
        line += `  <span class="err">★PEAK</span>`;
      }

      lines.push(line);
    });

    lines.push('');

    section(wrapBox('BY_MONTH', lines, W));
  })();

  /* ── 4. BY_MODEL ──────────────────────────────── */
  (function() {
    const totTok = D.by_model.reduce((s, m) => s + m.tokens, 0);
    const BAR_W  = 28;

    const lines = [''];
    D.by_model.forEach((m, i) => {
      const ratio   = m.tokens / totTok;
      const pct     = (ratio * 100).toFixed(1);
      const filled  = Math.round(ratio * BAR_W);
      const empty   = BAR_W - filled;
      const barHtml =
        `<span class="model-bar">${'█'.repeat(filled)}</span>` +
        `<span class="model-empty">${'░'.repeat(empty)}</span>`;

      const nameStr = esc(m.name);
      const pctStr  = pct.padStart(5) + '%';
      const tokStr  = F.num(m.tokens).padStart(7);
      const sessStr = String(m.sessions).padStart(4) + ' sess';

      const line =
        `<span class="model-name warn">${nameStr.padEnd(14)}</span>` +
        `<span class="dim">│</span>${barHtml}<span class="dim">│</span>` +
        `<span class="model-pct hi">${pctStr}</span>` +
        `<span class="model-tok dim">  ${tokStr}</span>` +
        `<span class="model-sess dim">  ${sessStr}</span>`;

      lines.push(line);
    });

    lines.push('');

    section(wrapBox('BY_MODEL', lines, W));
  })();

  /* ── 5. TOP_PROJECTS ──────────────────────────── */
  (function() {
    const lines = [''];
    const last  = D.top_projects.length - 1;

    D.top_projects.forEach((p, i) => {
      const branch   = i === last ? '└──' : '├──';
      const numStr   = String(i + 1).padStart(2, '0');
      const nameStr  = esc(p.name);
      const langStr  = esc(p.language);
      const tokStr   = F.num(p.tokens).padStart(7);
      const sessStr  = String(p.sessions).padStart(3) + ' sess';
      const descStr  = esc(p.description);

      lines.push(
        `<span class="proj-branch">${branch}</span> ` +
        `<span class="dim">${numStr}</span>  ` +
        `<span class="proj-name">${nameStr}</span>  ` +
        `<span class="proj-lang warn">[${langStr}]</span>  ` +
        `<span class="proj-tok">${tokStr}</span>  ` +
        `<span class="proj-sess dim">${sessStr}</span>`
      );
      // Description on next line, indented
      lines.push(
        `<span class="dim">${i === last ? '   ' : '│  '}      └ </span>` +
        `<span class="proj-desc dim" style="font-style:italic">${descStr}</span>`
      );
    });

    lines.push('');

    section(wrapBox('TOP_PROJECTS', lines, W));
  })();

  /* ── 6. HIGHLIGHTS ─────────────────────────────── */
  (function() {
    const DOT_LINE_LEN = 46; // total key+dots+val width
    const lines = [''];

    D.highlights.forEach(h => {
      const keyHtml    = `<span class="hl-key warn">${esc(h.label)}</span>`;
      const keyLen     = h.label.length;
      const valHtml    = `<span class="hl-val hi">${esc(h.value)}</span>`;
      const valLen     = h.value.length;
      const detailHtml = `<span class="hl-detail dim">(${esc(h.detail)})</span>`;
      const dots = Math.max(3, DOT_LINE_LEN - keyLen - valLen);
      const dotsHtml = `<span class="hl-dots dim"> ${'·'.repeat(dots)} </span>`;

      lines.push(
        `<span class="hl-arrow">▸</span> ${keyHtml}${dotsHtml}${valHtml}  ${detailHtml}`
      );
    });

    lines.push('');

    section(wrapBox('HIGHLIGHTS', lines, W));
  })();

  /* ── 7. SYSTEM INFO ────────────────────────────── */
  (function() {
    const lines = [
