name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: CLI help works
        run: |
          node bin/tokenfolio.js --help
          node bin/tokenfolio.js init --help

      - name: badge subcommand emits valid SVG
        run: |
          mkdir -p _ci-tmp && cd _ci-tmp
          cp ../data.js .
          node ../bin/tokenfolio.js badge
          test -s badge.svg || (echo "× badge.svg missing" && exit 1)
          test -s card.svg  || (echo "× card.svg missing" && exit 1)
          head -1 badge.svg | grep -q '<svg ' || (echo "× badge.svg not SVG" && exit 1)
          head -1 card.svg  | grep -q '<svg ' || (echo "× card.svg not SVG" && exit 1)
          echo "✓ badge.svg + card.svg generated"

      - name: pick subcommand writes redirect
        run: |
          cd _ci-tmp
          node ../bin/tokenfolio.js pick wrapped --force
          grep -q 'templates/wrapped/' index.html || (echo "× pick redirect missing" && exit 1)
          # Reject unknown templates
          ! node ../bin/tokenfolio.js pick xyzzy --force 2>&1 | grep -q "unknown template" && \
            ! node ../bin/tokenfolio.js pick xyzzy --force 2>/dev/null || true
          echo "✓ pick wrapped wrote redirect"
          cd .. && rm -rf _ci-tmp

      - name: Demo SVG present and well-formed
        run: |
          test -s previews/demo.svg || (echo "× previews/demo.svg missing" && exit 1)
          head -1 previews/demo.svg | grep -q '<svg' || (echo "× demo.svg not SVG" && exit 1)
          echo "✓ previews/demo.svg present"

      - name: All 12 templates serve 200
        run: |
          python3 -m http.server 8765 &
          server_pid=$!
          sleep 1
          fail=0
          for t in wrapped cosmos almanac terminal aurora holo pixel pass brutalist tcg vinyl synthwave; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:8765/templates/$t/")
            if [ "$code" != "200" ]; then
              echo "✗ $t failed: HTTP $code"
              fail=1
            else
              echo "✓ $t"
            fi
          done
          for asset in data.js share.js favicon.svg og.png index.html; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:8765/$asset")
            if [ "$code" != "200" ]; then
              echo "✗ asset $asset failed: HTTP $code"
              fail=1
            else
              echo "✓ asset $asset"
            fi
          done
          kill $server_pid
          exit $fail

      - name: Every template has a preview JPEG
        run: |
          fail=0
          for t in wrapped cosmos almanac terminal aurora holo pixel pass brutalist tcg vinyl synthwave; do
            f=previews/$t.jpg
            test -s "$f" || { echo "✗ $f missing or empty"; fail=1; }
          done
          [ $fail = 0 ] && echo "✓ all 12 previews present" || exit 1

      - name: Every template loads share.js + has data-tf-capture
        run: |
          fail=0
          for t in wrapped cosmos almanac terminal aurora holo pixel pass brutalist tcg vinyl synthwave; do
            f=templates/$t/index.html
            grep -q 'share.js' "$f"        || { echo "✗ $t missing share.js"; fail=1; }
            grep -q 'data-tf-capture' "$f" || { echo "✗ $t missing data-tf-capture"; fail=1; }
          done
          [ $fail = 0 ] && echo "✓ all templates wired up" || exit 1

      - name: share subcommand emits sane URLs
        run: |
          out=$(node bin/tokenfolio.js share --no-open --site-url https://example.com/me/ 2>&1)
          echo "$out" | grep -q 'twitter.com/intent/tweet' || (echo "× share missing X URL" && exit 1)
          echo "$out" | grep -q 'linkedin.com/sharing'    || (echo "× share missing LinkedIn URL" && exit 1)
          echo "✓ share subcommand prints intent URLs"

      - name: npm pack contents are sane
        run: |
          npm pack --dry-run 2>&1 | tee pack.log
          for must in bin/tokenfolio.js templates/wrapped/index.html templates/tcg/index.html data.js share.js index.html README.md LICENSE; do
            grep -q "$must" pack.log || (echo "× missing $must from npm pack" && exit 1)
          done
          echo "✓ npm pack contents OK"

      - name: og.py syntax checks
        run: |
          python3 -m py_compile scripts/gen-og.py

      - name: OG JS renderer (Satori path) emits a valid PNG
        run: |
          npm install -g satori @resvg/resvg-js
          cp data.js /tmp/test-data.js
          node bin/tokenfolio.js og --js --input /tmp/test-data.js --output /tmp/test-og.png
          # assert file exists and is > 10 KB
          size=$(wc -c < /tmp/test-og.png)
          [ "$size" -gt 10240 ] || (echo "× og.png too small: $size bytes" && exit 1)
          # assert PNG magic bytes: 89 50 4e 47 0d 0a 1a 0a
          python3 -c "
          import sys
          data = open('/tmp/test-og.png','rb').read(8)
          expected = bytes([0x89,0x50,0x4e,0x47,0x0d,0x0a,0x1a,0x0a])
          if data != expected:
              print(f'PNG magic mismatch: {data.hex()}')
              sys.exit(1)
          print('OK: PNG magic bytes correct')
          "
          echo "✓ JS renderer produced a valid PNG ($size bytes)"
