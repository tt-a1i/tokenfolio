name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: CLI help works
        run: |
          node bin/tokenfolio.js --help
          node bin/tokenfolio.js init --help

      - name: All 9 templates serve 200
        run: |
          python3 -m http.server 8765 &
          server_pid=$!
          sleep 1
          fail=0
          for t in wrapped cosmos almanac terminal aurora holo pixel pass brutalist; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:8765/templates/$t/")
            if [ "$code" != "200" ]; then
              echo "✗ $t failed: HTTP $code"
              fail=1
            else
              echo "✓ $t"
            fi
          done
          for asset in data.js favicon.svg og.png index.html; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:8765/$asset")
            if [ "$code" != "200" ]; then
              echo "✗ asset $asset failed: HTTP $code"
              fail=1
            else
              echo "✓ asset $asset"
            fi
          done
          kill $server_pid
          exit $fail

      - name: npm pack contents are sane
        run: |
          npm pack --dry-run 2>&1 | tee pack.log
          # bin/, templates/, data.js, index.html, favicon.svg, og.png, README, LICENSE
          for must in bin/tokenfolio.js templates/wrapped/index.html data.js index.html README.md LICENSE; do
            grep -q "$must" pack.log || (echo "× missing $must from npm pack" && exit 1)
          done
          echo "✓ npm pack contents OK"

      - name: og.py syntax checks
        run: |
          python3 -m py_compile scripts/gen-og.py
